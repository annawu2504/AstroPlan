lab_id: "Fluid-Lab-Demo"
bandwidth_kbps: 200

llm:
  # backend: "mock" | "anthropic" | "hf_local"
  # "mock"      → built-in rule-based planner, no GPU required
  # "anthropic" → Anthropic API (requires ANTHROPIC_API_KEY env var)
  # "hf_local"  → local HuggingFace model (see files/INFERENCE.md)
  # backend: "mock"
  # use_mock: true

  # # Anthropic settings (backend: anthropic)
  # model: "claude-sonnet-4-6"
  # api_key: "${ANTHROPIC_API_KEY}"
  # max_tokens: 2048
  # temperature: 0.2

  # Local-model settings (backend: hf_local)
  # model_path: "Qwen/Qwen3-4B"          # HF Hub ID or local path
  # device: "auto"                        # "auto" | "cuda" | "cuda:0" | "cpu"
  # load_in_4bit: false                   # NF4 quant — saves ~75% VRAM
  # load_in_8bit: false                   # INT8 quant — saves ~50% VRAM
  # Recommended: Qwen/Qwen2.5-3B-Instruct (open-weight, no login, ~6 GB)
  #              meta-llama/Llama-3.1-8B-Instruct (~16 GB or 4-bit: ~5 GB)
  #              google/gemma-2-2b-it (~5 GB)
  backend: "mock"
  use_mock: true
  model_path: "Qwen/Qwen2.5-3B-Instruct"  # change to your downloaded path
  device: "auto"
  load_in_4bit: false
  load_in_8bit: false
  max_tokens: 512
  temperature: 0.1
  
mcp:
  compress: true

orchestrator:
  max_replan_depth: 3
  hitl_timeout_s: 300
  latency_threshold_ms: 5000

web_monitor:
  host: "0.0.0.0"
  port: 8765
  enabled: false
