lab_id: "Fluid-Lab-Demo"
bandwidth_kbps: 200

llm:
  # backend: "mock" | "anthropic" | "hf_local"
  # "mock"      → built-in rule-based planner, no GPU required
  # "anthropic" → Anthropic API (requires ANTHROPIC_API_KEY env var)
  # "hf_local"  → local HuggingFace model (see files/INFERENCE.md)
  backend: "mock"
  use_mock: true

  # Anthropic settings (backend: anthropic)
  model: "claude-sonnet-4-6"
  api_key: "${ANTHROPIC_API_KEY}"
  max_tokens: 2048
  temperature: 0.2

  # Local-model settings (backend: hf_local)
  # model_path: "Qwen/Qwen3-4B"          # HF Hub ID or local path
  # device: "auto"                        # "auto" | "cuda" | "cuda:0" | "cpu"
  # load_in_4bit: false                   # NF4 quant — saves ~75% VRAM
  # load_in_8bit: false                   # INT8 quant — saves ~50% VRAM

mcp:
  compress: true

orchestrator:
  max_replan_depth: 3
  hitl_timeout_s: 300
  latency_threshold_ms: 5000

web_monitor:
  host: "0.0.0.0"
  port: 8765
  enabled: false
